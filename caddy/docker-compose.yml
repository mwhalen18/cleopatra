services:
    caddy:
        container_name: caddy
        # image: caddy:2.10.0-alpine
        image: caddy:latest
        env_file:
          - .env
          - ../.env
        build: .
        # publish everything you deem necessary
        ports:
            - '80:80/tcp'
            - '443:443/tcp'
            - '443:443/udp'
        networks:
            - caddy
        restart: unless-stopped
        volumes:
            - ./conf:/etc/caddy
            - ./site:/srv
            - ${DOCKER_VOLUMES}/caddy/data:/data
            - ${DOCKER_VOLUMES}/caddy/caddy_config:/config
        dns:
          - 1.1.1.1

networks:
    caddy:
        name: caddy
        enable_ipv6: true
        driver: bridge
        attachable: true