services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15
    container_name: wg-easy
    depends_on: [adguard]
    environment:
      - PORT=80
      - WG_HOST=${WG_HOST}
      - WG_DEFAULT_DNS=10.2.0.100
      - WG_PORT=51820
    volumes:
      - ${DOCKER_VOLUMES}/wg-easy:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
    networks:
      vpn-net:
        ipv4_address: 10.2.0.3
      caddy:
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1
  adguard:
    image: adguard/adguardhome:v0.107.64
    container_name: adguard
    restart: unless-stopped
    volumes:
      - ${DOCKER_VOLUMES}/adguard/work:/opt/adguardhome/work
      - ${DOCKER_VOLUMES}/adguard/conf:/opt/adguardhome/conf
    ports:
      - "53:53/tcp"    
      - "53:53/udp"    
      - 3000:3000/tcp
    networks:
      vpn-net:
        ipv4_address: 10.2.0.100
      caddy:

networks:
  vpn-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.2.0.0/24
  caddy:
    external: true


######################################################################################
## NOTE: You will need to run this to forward traffic                                #
## sudo iptables -t nat -A POSTROUTING -s 10.2.0.0/24 ! -d 10.2.0.0/24 -j MASQUERADE #
######################################################################################
