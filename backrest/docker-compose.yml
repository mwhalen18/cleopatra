version: "3.2"
services:
  backrest:
    image: garethgeorge/backrest:latest
    container_name: backrest
    hostname: backrest
    volumes:
      - ${DOCKER_VOLUMES}/backrest/data:/data
      - ${DOCKER_VOLUMES}/backrest/config:/config
      - ${DOCKER_VOLUMES}/backrest/cache:/cache
      - ${DOCKER_VOLUMES}/backrest/tmp:/tmp
      - ${DOCKER_VOLUMES}/backrest/rclone:/root/.config/rclone
      - ${DOCKER_VOLUMES}:/userdata # [optional] mount local paths to backup here.
      - ${BACKUP_PATH}:/repos # [optional] mount repos if using local storage, not necessary for remotes e.g. B2, S3, etc.
    environment:
      - BACKREST_DATA=/data # path for backrest data. restic binary and the database are placed here.
      - BACKREST_CONFIG=/config/config.json # path for the backrest config file.
      - XDG_CACHE_HOME=/cache # path for the restic cache which greatly improves performance.
      - TZ=America/Chicago # set the timezone for the container, used as the timezone for cron jobs.
    restart: unless-stopped
    ports:
      - 9898:9898
    labels:
      - "homepage.group=Other Services"
      - "homepage.name=Backrest"
      - "homepage.href=http://192.168.86.157:9898/"
