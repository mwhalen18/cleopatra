services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    ports:
      - 3001:3000
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      caddy:
    environment:
      HOMEPAGE_ALLOWED_HOSTS: cleopatra:3001,localhost:3001,127.0.0.1:3001,internal.matthewrwhalen.com

networks:
  caddy:
    external: true